<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K11 FLIX</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="nav">
  <div class="left">
    <div class="logo">K11 FLIX</div>
    <a href="#">Início</a>
    <a href="#">Categorias</a>
    <a href="#">Minha lista</a>
  </div>

  <input id="search" placeholder="Buscar..." onkeyup="renderTudo()">
</header>

<section class="top10">
  <div id="top10" class="top10-slide"></div>
</section>

<section class="section">
  <h2>🔥 Populares</h2>
  <div class="row" id="populares"></div>
</section>

<section class="section">
  <h2>📚 Clássicos</h2>
  <div class="row" id="classicos"></div>
</section>

<section class="section">
  <h2>🚀 Aventura</h2>
  <div class="row" id="aventura"></div>
</section>

<!-- LEITOR -->
<div id="leitor" class="leitor">
  <button onclick="fechar()">✖</button>
  <iframe id="frame"></iframe>

  <div class="acoes">
    <button onclick="like()">👍 Curtir</button>
    <button onclick="favoritar()">⭐ Favorito</button>
  </div>

  <div class="comentarios">
    <input id="comentInput" placeholder="Comentar...">
    <button onclick="comentar()">Enviar</button>
    <div id="comentLista"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
  </html>
