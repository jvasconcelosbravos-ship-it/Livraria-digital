<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Livraria Digital K11</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>📚 Livraria Digital</h1>

<input id="search" placeholder="Buscar livros..." oninput="searchBooks()">
</header>

<div class="categories">
<button onclick="filterCat('Todos')">Todos</button>
<button onclick="filterCat('Romance')">Romance</button>
<button onclick="filterCat('Terror')">Terror</button>
<button onclick="filterCat('Estudo')">Estudo</button>
<button onclick="filterCat('Aventura')">Aventura</button>
</div>

<div id="books" class="grid"></div>

<!-- LEITOR -->
<div id="reader" class="reader">
<button onclick="closeReader()">⬅ Voltar</button>

<h2 id="title"></h2>

<iframe id="frame"></iframe>

<button onclick="likeBook()">👍 Like</button>
<button onclick="favBook()">⭐ Favoritar</button>

<div id="comments"></div>
<input id="commentInput" placeholder="Comentário...">
<button onclick="addComment()">Enviar</button>

</div>

<footer>
<p>© K11 - Livraria Digital</p>
</footer>

<script src="app.js"></script>

</body>
</html>
