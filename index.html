<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca K11</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body>

<h1>📚 Biblioteca K11</h1>

<div class="container">

  <input id="searchInput" placeholder="Pesquisar livro..." onkeyup="render()" />

  <div class="form">
    <input id="titulo" placeholder="Título" />
    <input id="autor" placeholder="Autor" />
    <input id="link" placeholder="Link do livro" />
    <input id="imagem" placeholder="URL da capa" />

    <select id="categoria">
      <option>Romance</option>
      <option>Terror</option>
      <option>Aventura</option>
      <option>Estudo</option>
      <option>Outros</option>
    </select>

    <button onclick="addBook()">Adicionar livro</button>
  </div>

  <div id="lista"></div>

</div>

<script src="app.js"></script>

</body>
</html>
