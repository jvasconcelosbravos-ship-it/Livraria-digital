<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biblioteca Digital K11</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>📚 Biblioteca</h2>

      <nav>
        <a href="#">🏠 Início</a>
        <a href="#">🔎 Explorar</a>
        <a href="#">📖 Livros</a>
        <a href="#">❤️ Favoritos</a>
        <a href="#">⚙️ Configurações</a>
      </nav>

      <div class="footer-box">
        <p>100% Gratuito</p>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- HEADER -->
      <header class="top">
        <input type="text" placeholder="Pesquisar livros, autores..." />
      </header>

      <!-- HERO -->
      <section class="hero">
        <div class="hero-text">
          <h1>Conhecimento <span>liberta mentes.</span></h1>
          <p>Acesse livros gratuitos e explore novos mundos através da leitura.</p>

          <button>Explorar Biblioteca</button>
        </div>

        <div class="hero-card"></div>
      </section>

      <!-- CATEGORIES -->
      <section>
        <h2>Categorias</h2>
        <div class="categories">
          <span>Ficção</span>
          <span>Fantasia</span>
          <span>Romance</span>
          <span>História</span>
          <span>Ciência</span>
        </div>
      </section>

      <!-- BOOKS -->
      <section>
        <h2>Livros</h2>
        <div id="books" class="books"></div>
      </section>

    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
